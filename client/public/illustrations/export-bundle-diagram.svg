<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" rx="36" fill="#FAFAF9"/>
  <rect x="48" y="48" width="1104" height="664" rx="30" fill="#FFFFFF" stroke="#D6D3D1" stroke-width="2"/>
  <text x="84" y="118" fill="#44403C" font-family="Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2">EXPORT BUNDLE</text>
  <text x="84" y="164" fill="#0F172A" font-family="Arial, sans-serif" font-size="44" font-weight="700">What comes back from hosted evaluation.</text>

  <rect x="84" y="240" width="240" height="144" rx="22" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="2"/>
  <text x="112" y="294" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Rollout video</text>
  <text x="112" y="332" fill="#57534E" font-family="Arial, sans-serif" font-size="22">Episode review</text>

  <rect x="348" y="240" width="240" height="144" rx="22" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="2"/>
  <text x="376" y="294" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Metrics</text>
  <text x="376" y="332" fill="#57534E" font-family="Arial, sans-serif" font-size="22">Success and failure traces</text>

  <rect x="612" y="240" width="240" height="144" rx="22" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="2"/>
  <text x="640" y="294" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Datasets</text>
  <text x="640" y="332" fill="#57534E" font-family="Arial, sans-serif" font-size="22">Training-ready exports</text>

  <rect x="876" y="240" width="240" height="144" rx="22" fill="#F5F5F4" stroke="#D6D3D1" stroke-width="2"/>
  <text x="904" y="294" fill="#0F172A" font-family="Arial, sans-serif" font-size="28" font-weight="700">Raw bundle</text>
  <text x="904" y="332" fill="#57534E" font-family="Arial, sans-serif" font-size="22">Artifacts tied to the run</text>

  <path d="M204 430L996 430" stroke="#CBD5E1" stroke-width="10" stroke-linecap="round"/>
  <rect x="284" y="478" width="632" height="132" rx="26" fill="#0F172A"/>
  <text x="324" y="530" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="30" font-weight="700">Every export stays attached to one site and one runtime question.</text>
  <text x="324" y="572" fill="#CBD5E1" font-family="Arial, sans-serif" font-size="22">That keeps review, retraining, and release comparison grounded to the same facility.</text>
  <text x="84" y="666" fill="#78716C" font-family="Arial, sans-serif" font-size="20">Sample artifact. This is a stand-in until product-native export previews are ready.</text>
