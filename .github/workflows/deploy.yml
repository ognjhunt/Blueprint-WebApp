name: Deploy (Render, CI-gated)

# Single deploy owner for blueprint-webapp: render.yaml keeps Render-native
# auto-deploy OFF, and this workflow is the only path to production.
#
# Guarantees:
#   * Only an exact commit whose CI workflow concluded `success` on main can
#     deploy (workflow_run trigger + conclusion check + exact head SHA pin).
#   * Missing deploy configuration fails CLOSED: no API key or service ID
#     means the job errors loudly instead of silently skipping or falling back.
#   * The deployed SHA is observable at GET /version.json (written by
#     scripts/generate-build-info.mjs during the build).
#   * Rollback is revert-commit based (scripts/deploy-rollback.mjs) and rides
#     the same green-CI gate; history is never rewritten.
#
# One-time dashboard steps (documented in docs/runbooks/ci-gated-deploy-2026-07-16.md):
#   1. Store a Render API key as the RENDER_API_KEY Actions secret.
#   2. Store the service ID as the RENDER_SERVICE_ID Actions variable.
#   3. Confirm Auto-Deploy is off after this workflow is proven operational.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Exact git SHA to deploy on Render (operator-initiated redeploy/rollforward)."
        required: true
        type: string

concurrency:
  group: render-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Trigger CI-gated Render deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Resolve and verify deploy ref
        id: ref
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.event.inputs.ref }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            # Manual dispatch rides the same green-exact-commit gate as the
            # automatic path: resolve to a SHA, require it to be on main, and
            # require a successful CI run for that exact commit. Otherwise any
            # dispatcher could ship an arbitrary or red SHA.
            deploy_ref=$(gh api "repos/${REPO}/commits/${DISPATCH_REF}" --jq .sha)
            ancestry=$(gh api "repos/${REPO}/compare/${deploy_ref}...main" --jq .status)
            if [ "${ancestry}" != "identical" ] && [ "${ancestry}" != "ahead" ]; then
              echo "::error::${deploy_ref} is not an ancestor of main (compare status: ${ancestry}). Refusing to deploy."
              exit 1
            fi
            green_runs=$(gh api "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${deploy_ref}&status=completed" \
              --jq '[.workflow_runs[] | select(.conclusion=="success")] | length')
            if [ "${green_runs}" -eq 0 ]; then
              echo "::error::No successful CI run exists for ${deploy_ref}. Refusing to deploy a commit CI has not proven green."
              exit 1
            fi
          else
            deploy_ref="${WORKFLOW_RUN_SHA}"
          fi
          if [ -z "${deploy_ref}" ]; then
            echo "::error::Could not resolve a git SHA to deploy."
            exit 1
          fi
          echo "deploy_ref=${deploy_ref}" >> "${GITHUB_OUTPUT}"
          echo "Deploying exact ref ${deploy_ref}"

      - name: Trigger exact-SHA Render deploy through API (fail-closed)
        id: render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          DEPLOY_REF: ${{ steps.ref.outputs.deploy_ref }}
        run: |
          set -euo pipefail
          if [ -z "${RENDER_API_KEY:-}" ]; then
            echo "::error::RENDER_API_KEY secret is not set. Deploys fail closed. See docs/runbooks/ci-gated-deploy-2026-07-16.md."
            exit 1
          fi
          case "${RENDER_SERVICE_ID:-}" in
            srv-*) ;;
            *)
              echo "::error::RENDER_SERVICE_ID Actions variable is missing or invalid."
              exit 1
              ;;
          esac
          payload=$(printf '{"commitId":"%s","clearCache":"do_not_clear"}' "${DEPLOY_REF}")
          response_code=$(curl -s -o /tmp/render-deploy-response.txt -w "%{http_code}" \
            --request POST \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data "${payload}" \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys")
          echo "Render deploy API responded ${response_code}"
          if [ "${response_code}" -lt 200 ] || [ "${response_code}" -ge 300 ]; then
            echo "::error::Render deploy API returned HTTP ${response_code}."
            cat /tmp/render-deploy-response.txt || true
            exit 1
          fi
          deploy_id=$(node -e '
            const fs = require("node:fs");
            const response = JSON.parse(fs.readFileSync("/tmp/render-deploy-response.txt", "utf8"));
            if (typeof response.id !== "string" || !response.id.startsWith("dep-")) process.exit(1);
            process.stdout.write(response.id);
          ')
          if [ -z "${deploy_id}" ]; then
            echo "::error::Render accepted the request but did not return a deploy ID."
            exit 1
          fi
          echo "deploy_id=${deploy_id}" >> "${GITHUB_OUTPUT}"
          echo "Render accepted deploy ${deploy_id} for ${DEPLOY_REF}. API acceptance is NOT deployment success; the verify step below is the gate."

      - name: Verify deployment completed at the exact SHA
        env:
          DEPLOY_REF: ${{ steps.ref.outputs.deploy_ref }}
          RENDER_DEPLOY_ID: ${{ steps.render.outputs.deploy_id }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ vars.RENDER_SERVICE_ID }}
          BASE_URL: https://tryblueprint.io
        run: |
          set -euo pipefail
          mkdir -p /tmp/deploy-evidence
          evidence=/tmp/deploy-evidence/deploy-verification.json
          started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Poll Render's deploy record first so build/update failures surface
          # directly rather than looking like a generic live-SHA timeout.
          deploy_status=""
          for attempt in $(seq 1 80); do
            if ! response_code=$(curl -s -o /tmp/deploy-evidence/render-deploy.json -w "%{http_code}" \
              --max-time 20 \
              --header "Authorization: Bearer ${RENDER_API_KEY}" \
              "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${RENDER_DEPLOY_ID}"); then
              response_code=000
            fi
            if [ "${response_code}" = "200" ]; then
              deploy_status=$(node -e '
                const fs = require("node:fs");
                const response = JSON.parse(fs.readFileSync("/tmp/deploy-evidence/render-deploy.json", "utf8"));
                process.stdout.write(typeof response.status === "string" ? response.status : "");
              ')
            fi
            case "${deploy_status}" in
              live) break ;;
              build_failed|update_failed|canceled|deactivated)
                echo "::error::Render deploy ${RENDER_DEPLOY_ID} ended with status ${deploy_status}."
                exit 1
                ;;
            esac
            echo "Attempt ${attempt}/80: Render deploy status='${deploy_status:-unreachable}'. Waiting 15s."
            sleep 15
          done
          if [ "${deploy_status}" != "live" ]; then
            echo "::error::Render deploy ${RENDER_DEPLOY_ID} did not become live after 20 minutes."
            exit 1
          fi

          # Poll GET /version.json until the exact requested SHA is serving
          # traffic. Timeout: 20 minutes.
          deployed_sha=""
          for attempt in $(seq 1 40); do
            deployed_sha=$(curl -sf --max-time 20 "${BASE_URL}/version.json" | { grep -o '"git_sha"[^,}]*' || true; } | { grep -o '[0-9a-f]\{40\}' || true; })
            if [ "${deployed_sha}" = "${DEPLOY_REF}" ]; then
              break
            fi
            echo "Attempt ${attempt}/40: live git_sha='${deployed_sha:-unreachable}' != '${DEPLOY_REF}'. Waiting 30s."
            sleep 30
          done
          if [ "${deployed_sha}" != "${DEPLOY_REF}" ]; then
            echo "::error::Deployment did not converge: live /version.json still reports '${deployed_sha:-unreachable}' after 20 minutes, expected ${DEPLOY_REF}."
            exit 1
          fi
          echo "Live /version.json reports the exact requested SHA ${DEPLOY_REF}."

          # Liveness and readiness are verified separately: /health proves the
          # process serves traffic; /health/ready reports launch readiness and
          # is recorded truthfully (its verdict is evidence, and a not-ready
          # verdict fails this gate because the service is not beta-servable).
          health_code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "${BASE_URL}/health")
          ready_code=$(curl -s -o /tmp/deploy-evidence/health-ready-body.json -w "%{http_code}" --max-time 20 "${BASE_URL}/health/ready")
          finished_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{"render_deploy_id":"%s","render_deploy_status":"%s","deploy_ref":"%s","live_git_sha":"%s","health_status":%s,"health_ready_status":%s,"started_at":"%s","finished_at":"%s"}\n' \
            "${RENDER_DEPLOY_ID}" "${deploy_status}" "${DEPLOY_REF}" "${deployed_sha}" "${health_code}" "${ready_code}" "${started_at}" "${finished_at}" > "${evidence}"
          cat "${evidence}"
          if [ "${health_code}" != "200" ]; then
            echo "::error::GET /health returned ${health_code}; expected 200."
            exit 1
          fi
          if [ "${ready_code}" != "200" ]; then
            echo "::error::GET /health/ready returned ${ready_code}; the deployed commit is live but the service is not launch-ready."
            exit 1
          fi

      - name: Upload deployment evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-verification
          path: /tmp/deploy-evidence
          if-no-files-found: ignore
