name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout BlueprintContracts for shared robot-eval contract
        env:
          CONTRACTS_REPOSITORY: ognjhunt/BlueprintContracts
          # Keep this aligned with BlueprintCapturePipeline's blueprint-contracts pin.
          CONTRACTS_REF: 7708a4e4c5dedeeb39cc73d3f6869304de295b81
          CONTRACTS_TOKEN: ${{ secrets.BLUEPRINT_CONTRACTS_CHECKOUT_TOKEN || github.token }}
        run: |
          set -euo pipefail
          git init BlueprintContracts
          cd BlueprintContracts
          git remote add origin "https://x-access-token:${CONTRACTS_TOKEN}@github.com/${CONTRACTS_REPOSITORY}.git"
          fetch_ref="${CONTRACTS_REF:-main}"
          if git fetch --depth=1 origin "${fetch_ref}"; then
            echo "Using BlueprintContracts ref ${fetch_ref}"
          else
            echo "::error::BlueprintContracts ref '${fetch_ref}' was not available. Push a matching Contracts branch/ref or set CONTRACTS_REF; refusing to validate against an implicit fallback."
            exit 1
          fi
          git checkout --detach FETCH_HEAD

      - name: Verify shared robot-eval job request contract
        run: npm run pipeline:robot-eval-contract:verify -- --contracts-module BlueprintContracts/js/robot-eval-job-request.mjs

      # Best-effort: compare against the SAME branch in the sibling repo when it
      # exists (so a coordinated cross-repo change stays green pre-merge), else
      # main. If the sibling cannot be fetched (token lacks read access), the
      # guard degrades to a warning instead of hard-failing every WebApp build.
      - name: Checkout BlueprintCapture for Firestore + Storage rules parity
        id: capture_checkout
        continue-on-error: true
        env:
          CAPTURE_REPOSITORY: ognjhunt/BlueprintCapture
          CAPTURE_TOKEN: ${{ secrets.BLUEPRINT_CONTRACTS_CHECKOUT_TOKEN || github.token }}
        run: |
          set -euo pipefail
          # Clone OUTSIDE the repo tree (RUNNER_TEMP) so later steps such as
          # audit:assets/build never scan the sibling checkout's files.
          dest="${RUNNER_TEMP}/BlueprintCapture"
          rm -rf "$dest"
          git init "$dest"
          cd "$dest"
          git remote add origin "https://x-access-token:${CAPTURE_TOKEN}@github.com/${CAPTURE_REPOSITORY}.git"
          branch_ref="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          if git fetch --depth=1 origin "${branch_ref}"; then
            echo "Using BlueprintCapture ref ${branch_ref}"
          elif git fetch --depth=1 origin main; then
            echo "Using BlueprintCapture ref main"
          else
            echo "::warning::Could not fetch BlueprintCapture; skipping cross-repo rules parity."
            exit 1
          fi
          git checkout --detach FETCH_HEAD

      - name: Firestore + Storage rules parity (last-writer-wins guard)
        if: steps.capture_checkout.outcome == 'success'
        run: |
          npm run rules:parity -- --ios-rules "${RUNNER_TEMP}/BlueprintCapture/firestore.rules"
          npm run rules:parity:storage -- --ios-rules "${RUNNER_TEMP}/BlueprintCapture/storage.rules"

      - name: Warn if rules parity was skipped
        if: steps.capture_checkout.outcome != 'success'
        run: echo "::warning::Cross-repo rules parity did not run (sibling checkout failed). Verify storage.rules/firestore.rules parity manually before deploying."

      - name: Audit assets
        run: npm run audit:assets

      - name: Typecheck
        run: npm run check

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:coverage

      - name: Upload coverage
        if: ${{ hashFiles('coverage/**') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Verify Playwright install
        run: npx playwright install --dry-run

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Run operator-surfaces QA (fake-auth bypass)
        run: npm run qa:operator


  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run build-output tests
        run: npm run test:build-output
