schema: blueprint/dynamic-budget-allocation-policy/v1
date: 2026-06-01
description: Deterministic local policy for recommending autonomous-org budget reallocations without live mutation.
budget_cap_usd: 500
paperclip_declared_subcap_usd: 173
openai_api_target_usd: 0
openai_api_requires_approval_artifact: true
openai_api_approval_artifact: null
max_single_move_usd: 40
minimum_confidence: 0.7
high_performance_score: 0.72
low_performance_score: 0.35
allocation_grade_proof_levels:
  - repo-local-export
  - live-performance
protected_lines:
  - budget_line: Paperclip agent/runtime envelope
    minimum_usd: 173
    tier: P0
    reason: Product, proof, intake, support, and reliability routines stay protected.
  - budget_line: Render WebApp hosting
    minimum_usd: 25
    tier: P0
    reason: WebApp hosting is required for buyer and ops surfaces.
  - budget_line: Paperclip VPS / tunnel
    minimum_usd: 30
    tier: P0
    reason: Paperclip execution/control-plane host stays protected.
  - budget_line: Firebase / Firestore / storage
    minimum_usd: 25
    tier: P0
    reason: Request, entitlement, operating graph, and support ledgers stay protected.
  - budget_line: Redis / cache
    minimum_usd: 10
    tier: P0
    reason: Hosted-session live-state reliability stays protected.
  - budget_line: Email / human reply / Slack
    minimum_usd: 7
    tier: P0
    reason: Human blocker reply durability and support routing stay protected.
