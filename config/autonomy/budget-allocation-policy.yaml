proof_rules:
  no_recommendation_from:
    - missing
    - stale
    - fixture
    - unsupported
    - repo-local-config
  repo_local_export_can_recommend: true
  repo_local_export_is_live_performance: false
  missing_or_stale_result: no reallocation, improve proof first
human_approval_required_for:
  - live_spend
  - ads
  - sends
  - provider_jobs
  - city_activation
  - vendor_budget_change
  - Stripe
  - Render
  - Firebase
  - Notion
  - Paperclip production state
  - hosted sessions
  - rights/legal state
  - customer/traction claims
forbidden_live_mutations:
  - live spend
  - ads creation or launch
  - sends
  - provider jobs
  - Stripe payment, payout, or entitlement mutation
  - Render or Firebase production mutation
  - Notion writes
  - Paperclip production mutation
  - hosted-session fulfillment
  - rights, privacy, or legal clearance
  - city activation
  - customer or traction claims
