key: preview_diagnosis_isolated
description: Isolated preview-diagnosis profile for rendered evidence and bug triage without business-state mutation.
runtime_lane: qa
adapter_policy:
  preferred:
    - codex_local
    - claude_local
tools:
  allow:
    - repo_read
    - notion_read
    - build
    - test
    - browser_read
    - screenshot
  deny:
    - finance_mutation
    - notion_write
    - slack_post
network_policy:
  mode: restricted
repo_mounts:
  - /Users/nijelhunt_1/workspace/Blueprint-WebApp
memory:
  bind:
    - doctrine_shared
    - project_shared:blueprint-webapp
vault:
  default_scope: session
  allowed_refs:
    - NOTION_API_TOKEN
    - BLUEPRINT_PAPERCLIP_GITHUB_TOKEN
  allowed_tools:
    - notion
    - github
artifacts:
  require_trace_link: true
  publish_to_issue: true
review:
  human_gate: beta-launch-review
